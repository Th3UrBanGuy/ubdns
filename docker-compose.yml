version: '3.8'

services:
  dns-gateway:
    build: .
    container_name: ubdns
    ports:
      - "8080:8080"
    environment:
      - PYTHON_VERSION=3.11
      - PORT=8080
      - ENABLE_NO_LOG=true
      - STRIP_CLIENT_IP=true
      - OBFUSCATE_QUERIES=true
      - ADMIN_PASSWORD=726268
      - UPSTREAM_DNS=8.8.8.8
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
