version: '3.8'

services:
  dns-gateway:
    build:
      context: .
      dockerfile: Dockerfile.simple
    container_name: ubdns-simple
    ports:
      - "8080:8080"
    environment:
      - PYTHON_VERSION=3.11
      - PORT=8080
      - ENABLE_NO_LOG=true
      - ADMIN_PASSWORD=726268
      - ENABLE_CLOUDFLARE_TUNNEL=true
      # For permanent tunnel (optional - requires Cloudflare account)
      # - CLOUDFLARE_TUNNEL_NAME=my-tunnel
      # - CLOUDFLARE_TUNNEL_TOKEN=your-tunnel-token
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
