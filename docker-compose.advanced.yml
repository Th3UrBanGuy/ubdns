version: '3.8'

services:
  dns-gateway:
    build:
      context: .
      dockerfile: Dockerfile.advanced
    container_name: ubdns-advanced
    ports:
      - "8080:8080"
    environment:
      - PYTHON_VERSION=3.11
      - PORT=8080
      - ENABLE_NO_LOG=true
      - STRIP_CLIENT_IP=true
      - OBFUSCATE_QUERIES=true
      - ADMIN_PASSWORD=726268
      - ENABLE_CLOUDFLARE_TUNNEL=true
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

networks:
  default:
    name: ubdns-network
